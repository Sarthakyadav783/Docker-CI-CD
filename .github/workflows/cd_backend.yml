name: Deploy the backend

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push to Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile.backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/my-turborepo-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/my-turborepo-backend:${{ github.sha }}

      - name: Deploy to VM
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/ssh_key
          chmod 600 ~/ssh_key
          ssh -o StrictHostKeyChecking=no -i ~/ssh_key ec2-user@${{ secrets.DEV_HOST }} "
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/my-turborepo-backend:${{ github.sha }} &&
            docker stop user_backend || true &&
            docker rm user_backend || true &&
            docker run -d --name user_backend -p 8080:8080 \
              -e DATABASE_URL=${{ secrets.DATABASE_URL }} \
              ${{ secrets.DOCKERHUB_USERNAME }}/my-turborepo-backend:${{ github.sha }}
          "